<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackport</title>
  <meta name="description" content="Stackport">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' width='100' height='100'/><polygon points='50,15 85,35 85,65 50,85 15,65 15,35' fill='none' stroke='%23f59e0b' stroke-width='4'/></svg>">
  <link rel="stylesheet" href="styles.css">

<body>
  <div class="noise"></div>
  <div class="aurora"></div>

  <canvas id="particles"></canvas>

      <svg viewBox="0 0 200 200">
        <polygon points="100,10 178,55 178,145 100,190 22,145 22,55" />

    </div>
    <div class="ring ring-2">
      <svg viewBox="0 0 200 200">
        <polygon points="100,20 168,60 168,140 100,180 32,140 32,60" />
      </svg>
    </div>
    <div class="ring ring-3">
      <svg viewBox="0 0 200 200">
        <polygon points="100,30 158,65 158,135 100,170 42,135 42,65" />
      </svg>
    </div>
    <div class="ring ring-4">
      <svg viewBox="0 0 200 200">
        <polygon points="100,40 148,70 148,130 100,160 52,130 52,70" />
      </svg>
    </div>
    <div class="ring ring-5">
      <svg viewBox="0 0 200 200">
        <polygon points="100,50 138,75 138,125 100,150 62,125 62,75" />
      </svg>
    </div>
    <div class="ring ring-6">
      <svg viewBox="0 0 200 200">
        <polygon points="100,60 128,80 128,120 100,140 72,120 72,80" />
      </svg>
    </div>
    <div class="core"></div>
  </div>

  <div class="vignette"></div>

  <script src="script.js"></script>
</body>
</html>
