<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackport</title>
  <meta name="description" content="Stackport">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' width='100' height='100'/><text x='50' y='68' text-anchor='middle' fill='%23fff' font-size='60' font-family='system-ui' font-weight='bold'>S</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="grain"></div>

  <div class="container">
    <div class="word">
      <span class="letter" data-letter="s" style="--i: 0">
        <span class="letter-main">s</span>
        <span class="letter-shadow">s</span>
        <span class="letter-shadow">s</span>
        <span class="letter-shadow">s</span>
      </span>
      <span class="letter" data-letter="t" style="--i: 1">
        <span class="letter-main">t</span>
        <span class="letter-shadow">t</span>
        <span class="letter-shadow">t</span>
        <span class="letter-shadow">t</span>
      </span>
      <span class="letter" data-letter="a" style="--i: 2">
        <span class="letter-main">a</span>
        <span class="letter-shadow">a</span>
        <span class="letter-shadow">a</span>
        <span class="letter-shadow">a</span>
      </span>
      <span class="letter" data-letter="c" style="--i: 3">
        <span class="letter-main">c</span>
        <span class="letter-shadow">c</span>
        <span class="letter-shadow">c</span>
        <span class="letter-shadow">c</span>
      </span>
      <span class="letter" data-letter="k" style="--i: 4">
        <span class="letter-main">k</span>
        <span class="letter-shadow">k</span>
        <span class="letter-shadow">k</span>
        <span class="letter-shadow">k</span>
      </span>
      <span class="letter" data-letter="p" style="--i: 5">
        <span class="letter-main">p</span>
        <span class="letter-shadow">p</span>
        <span class="letter-shadow">p</span>
        <span class="letter-shadow">p</span>
      </span>
      <span class="letter" data-letter="o" style="--i: 6">
        <span class="letter-main">o</span>
        <span class="letter-shadow">o</span>
        <span class="letter-shadow">o</span>
        <span class="letter-shadow">o</span>
      </span>
      <span class="letter" data-letter="r" style="--i: 7">
        <span class="letter-main">r</span>
        <span class="letter-shadow">r</span>
        <span class="letter-shadow">r</span>
        <span class="letter-shadow">r</span>
      </span>
      <span class="letter" data-letter="t" style="--i: 8">
        <span class="letter-main">t</span>
        <span class="letter-shadow">t</span>
        <span class="letter-shadow">t</span>
        <span class="letter-shadow">t</span>
      </span>
    </div>
  </div>

  <canvas id="grid"></canvas>

  <script src="script.js"></script>
</body>
</html>
